<main class="min-h-screen flex flex-col items-center justify-center p-8 relative overflow-hidden">
  <!-- Efeito visual sutil de luz de fundo -->
  <div class="absolute inset-0 bg-radial-gradient from-white/5 via-transparent to-transparent opacity-35 pointer-events-none"></div>
  
  <div class="z-10 text-center max-w-4xl px-4">
    <!-- Subtítulo de posicionamento rápido -->
    <span class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest bg-white/5 text-gray-300 border border-white/10 mb-6 inline-block">
      Engenharia de Software de Alta Performance
    </span>

    <!-- Título de Impacto visual -->
    <h1 class="text-6xl sm:text-8xl font-extrabold tracking-tight mb-6 bg-clip-text text-transparent bg-gradient-to-r from-white via-gray-100 to-gray-500">
      Rafael Ribeiro
    </h1>
    
    <!-- Proposta de Valor Profissional (Copywriting Sênior) -->
    <h2 class="text-xl sm:text-2xl text-gray-400 mb-12 leading-relaxed max-w-2xl mx-auto font-light">
      Construindo arquiteturas corporativas robustas e interfaces de alta disponibilidade com <strong class="text-white font-semibold">Angular</strong> & <strong class="text-white font-semibold">Node.js</strong>.
    </h2>
    
    <!-- CTA Principal de Alta Conversão -->
    <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
      <a 
        href="https://wa.me/seu-numero" 
        target="_blank"
        class="w-full sm:w-auto text-center px-8 py-4 bg-white text-black font-extrabold rounded-xl hover:bg-gray-200 transition-all duration-300 shadow-[0_0_30px_rgba(255,255,255,0.08)] hover:shadow-[0_0_45px_rgba(255,255,255,0.25)] hover:scale-[1.02]"
      >
        [ Iniciar Projeto / Falar com Especialista ]
      </a>
      
      <a 
        href="#vivo"
        class="w-full sm:w-auto text-center px-8 py-4 bg-transparent text-white font-bold rounded-xl border border-white/10 hover:bg-white/5 transition-all duration-300 hover:border-white/20"
      >
        Explorar Engenharia ↓
      </a>
    </div>
  </div>
</main>

<div class="w-full">
  <app-experience-list (themeProgress)="onThemeChanged($event)"></app-experience-list>
</div>
